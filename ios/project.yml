name: StemMixer
options:
  bundleIdPrefix: com.user
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  StemMixer:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: StemMixer
    info:
      path: StemMixer/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: "Used for audio import."
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UIBackgroundModes:
          - audio
        CFBundleDocumentTypes:
          - CFBundleTypeName: Audio
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.audio
              - public.mp3
              - public.mpeg-4-audio
              - com.microsoft.waveform-audio
              - public.aiff-audio
              - public.aifc-audio
              - org.xiph.flac
          - CFBundleTypeName: Video
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.mpeg-4
              - public.movie
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.user.StemMixer
        INFOPLIST_FILE: StemMixer/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
